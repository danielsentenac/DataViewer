name: dataviewer
description: Virgo channel mobile frontend for catalog search and time-series plots.
publish_to: none
version: 0.2.1+6

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.9.2
  flutter_riverpod: ^3.3.1
  flutter_file_dialog: ^3.0.3
  go_router: ^17.1.0
  intl: ^0.20.2
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  syncfusion_flutter_charts: ^32.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
